<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISR — Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="login-shell">
        <section class="login-card">
            <center><img src="../images/isr-logo.png" alt="ISR logo" height="50">
            <br>
            <p class="login-subtitle">Welcome! Choose your login option.</p></center>

            <div class="login-section">
                <label class="login-label" for="login-username">Take your own account</label>
                <input
                    id="login-username"
                    type="text"
                    placeholder="Enter your name"
                    autocomplete="name"
                >

                <div class="login-actions" style="margin-top: 12px;">
                    <button id="login-btn" type="button" disabled>Login</button>
                    <button id="register-btn" type="button" disabled>Register</button>
                </div>
            </div>

            <div class="login-divider">OR</div>

            <div class="login-section">
                <label class="login-label" for="testProfiles">Take one of preset profiles</label>
                <input
                    list="testProfiless"
                    id="testProfiles"
                    type="text"
                    placeholder="Choose a preset profile"
                    autocomplete="off"
                >
                <datalist id="testProfiless">
                    <option value="Elon Musk"></option>
                    <option value="Audrey Tang"></option>
                    <option value="Iryna Volnytska"></option>
                    <option value="Andrii Dligach"></option>
                    <option value="Sergey Brin"></option>
                </datalist>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
