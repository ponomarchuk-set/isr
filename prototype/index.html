<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to ISR</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- <div style="display: flex; gap: 20px; padding: 20px; flex-direction: column; align-items: center;"> -->
    <div style="display: flex; flex-direction: column; align-items: center;">
        <p>Welcome to</p>
        <img src="../images/logo-t.png" alt="ISR homepage" height="100">
        <p>Choose your login option:</p>
        <div style="display: flex; gap: 20px; padding: 20px; justify-content: center;">
            <!-- <div style="border-radius: 12px; padding: 20px; box-sizing: border-box;"> -->
            <div style="box-sizing: border-box;">
                <p>Take your own account</p>
                <input type="text" id="login-username" placeholder="Username"><br>
                <input type="password" placeholder="Password"><br><br>
                <button id="login-btn" disabled>Login</button>
                <button id="register-btn" disabled>Register</button>
            </div>
            <!-- <div style="border-radius: 12px; padding: 20px; box-sizing: border-box;" > -->
            <div>
                <p>OR</p>
            </div>
            <!-- <div style="border-radius: 12px; padding: 20px; box-sizing: border-box;" > -->
            <div style="box-sizing: border-box;" >
                <p>Take one of presetted profiles:</p>
                <!-- <label for="testProfiles">Choose from list or type:</label> -->
                <input list="testProfiless" id="testProfiles" name="testProfiles" placeholder="Type or select...">

                <datalist id="testProfiless">
                <option value="Elon Musk">
                <option value="Sergey Brin">
                <option value="Iryna Volnytska">
                <option value="Andrii Dligach">
                <option value="Audrey Tang">
                </datalist>
            </div>
        </div>
        <p>Or feel free to chat with Assistant:</p>
        <button onclick="openChat()">Assistant</button>
    </div>


    <div id="chat-window" class="chat-window">
        <header>
            <span>Assistant</span>
            <button style="float:right;" onclick="closeChat()">X</button>
        </header>
        <div class="content">
            <textarea>
1. Overview
2. Tutor
3. Value guide
Some other help?
            </textarea>
        </div>

    </div>


    <script src="script.js"></script>
</body>
</html>
